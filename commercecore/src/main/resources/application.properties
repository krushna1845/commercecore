spring.datasource.url=jdbc:mysql://localhost:3306/commerce_db
spring.datasource.username=root
spring.datasource.password=Krish@123

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.application.name=commercecore

# Stripe Payment Gateway (replace with your real test keys from https://dashboard.stripe.com)
stripe.secret.key=${STRIPE_SECRET_KEY}
stripe.webhook.secret=

# JWT Configuration
jwt.expiration.ms=86400000
jwt.secret=

# Default admin credentials for initial setup. Change these values immediately in production.
admin.username=admin
admin.password=Admin@123

# Run on a different port to avoid conflict with Apache httpd
server.port=8081

# Redis Configuration (optional - defaults to localhost:6379)
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.password=
spring.redis.timeout=2000
spring.redis.database=0
spring.redis.jedis.pool.max-active=8
spring.redis.jedis.pool.max-idle=8
spring.redis.jedis.pool.min-idle=0

# Caching Configuration
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000

# AI assistants (set one of these to enable real AI responses)
openai.api.key=${OPENAI_API_KEY:}
grok.api.key=${GROK_API_KEY:}

# Cloudinary (set your credentials or use env vars)
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}